<!DOCTYPE html>
<html>
<head>
    <title>{{ title if title else "Hate Speech Detection" }}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }

        .card {
            width: 450px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #4facfe;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }

        a {
            display: block;
            margin-top: 15px;
            color: #333;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>

<div class="card">
    {% block content %}{% endblock %}
</div>

</body>
</html>
